<header
  class="flex items-center justify-between border-b border-white/[0.06] bg-[#080b16]/80 px-4 py-3 backdrop-blur-xl lg:hidden"
>
  <a routerLink="/" class="flex items-center gap-2">
    <span class="brand-logo h-8 w-8 shrink-0" role="img" aria-label="LicenseGuard"></span>
    <span class="font-extrabold tracking-tight text-white"
      >License<span class="text-blue-500">Guard</span></span
    >
  </a>
  <button
    type="button"
    (click)="layout.open()"
    aria-label="Menü öffnen"
    class="rounded-lg px-2.5 py-2 text-slate-300 transition hover:bg-white/[0.06]"
  >
    <i class="fa-solid fa-bars text-[18px]"></i>
  </button>
</header>
